<div id="assetHistoryView" style="display:none;">
    <div class="container-main">
        <h1><i class="fas fa-history" style="color:#4f46e5;"></i> Asset History <span class="company-badge" id="historyCompanyBadge">Loading...</span></h1>
        <p class="text-muted">Complete history of all assets including past and current users.</p>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
            <button class="btn btn-success" onclick="exportHistoryPDF()"><i class="fas fa-file-pdf"></i> Export to PDF</button>
            <button class="btn btn-secondary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div class="search-box mb-3">
            <div class="input-group"><span class="input-group-text"><i class="fas fa-search"></i></span><input type="text" id="historySearchInput" class="form-control" placeholder="Search by asset no., description, user..."></div>
        </div>
        <div class="table-responsive">
            <table id="historyTable" class="table table-striped table-hover align-middle" style="width:100%;">
                <thead class="table-light">
                    <tr>
                        <th>Asset No.</th><th>Description</th><th>Category</th><th>Serial</th><th>Current User</th>
                        <th>History</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
