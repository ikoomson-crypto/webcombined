<div id="categoriesView" style="display:none;">
    <div class="container-main">
        <h1><i class="fas fa-tag" style="color:#4f46e5;"></i> Add Category <span class="company-badge" id="categoriesCompanyBadge">Loading...</span></h1>
        <div class="card border-0 shadow-sm mb-4"><div class="card-header bg-primary text-white"><i class="fas fa-plus-circle"></i> Create Category</div>
            <div class="card-body"><div class="row g-2"><div class="col-md-8"><input type="text" id="newCategoryName" class="form-control" placeholder="Category name (e.g. IT Equipment)"></div><div class="col-md-4"><button class="btn btn-primary w-100" onclick="createCategory()"><i class="fas fa-save"></i> Create</button></div></div></div>
        </div>
        <div class="card border-0 shadow-sm"><div class="card-header bg-info text-white"><i class="fas fa-list"></i> Existing Categories</div>
            <div class="card-body"><div id="categoriesList"><div class="text-muted text-center">Loading...</div></div></div>
        </div>
        <div class="card border-0 shadow-sm mt-4"><div class="card-header bg-success text-white"><i class="fas fa-chart-pie"></i> Category Stats</div>
            <div class="card-body"><div class="row" id="categoryStats"></div></div>
        </div>
    </div>
</div>
