<div id="assetsView" style="display:none;">
    <div class="container-main">
        <h1><i class="fas fa-plus-circle" style="color:#4f46e5;"></i> Add Assets <span class="company-badge" id="assetsCompanyBadge">Loading...</span></h1>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-3">
            <button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Asset</button>
            <button class="btn btn-success" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Export</button>
            <button class="btn btn-info text-white" onclick="downloadTemplate()"><i class="fas fa-download"></i> Template</button>
            <button class="btn btn-warning" onclick="importExcel()"><i class="fas fa-upload"></i> Import</button>
            <button class="btn btn-danger" id="bulkDeleteBtn" onclick="bulkDelete()" style="display:none;"><i class="fas fa-trash-alt"></i> Delete Selected</button>
            <button class="btn btn-secondary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
        <div id="bulkActionsBar" class="bulk-actions-bar">
            <span><i class="fas fa-check-circle"></i> <span class="selected-count" id="selectedCount">0</span> asset(s) selected</span>
            <div>
                <button class="btn btn-sm btn-success" onclick="selectAll()"><i class="fas fa-check-double"></i> All</button>
                <button class="btn btn-sm btn-secondary" onclick="deselectAll()"><i class="fas fa-times"></i> None</button>
                <button class="btn btn-sm btn-danger" onclick="bulkDelete()"><i class="fas fa-trash-alt"></i> Delete</button>
            </div>
        </div>
        <div class="search-box mb-3">
            <div class="input-group"><span class="input-group-text"><i class="fas fa-search"></i></span><input type="text" id="searchInput" class="form-control" placeholder="Search by asset no., category, description, user, entity..."></div>
        </div>
        <div class="table-responsive">
            <table id="assetsTable" class="table table-striped table-hover align-middle" style="width:100%;">
                <thead class="table-light">
                    <tr>
                        <th style="width:30px;"><input type="checkbox" id="selectAllCheckbox" onclick="toggleSelectAll()"></th>
                        <th>Asset No.</th><th>Category</th><th>Description</th><th>User</th><th>Serial</th><th>Condition</th>
                        <th>Purchase</th><th>Depr. Start</th><th>Life (Yrs)</th><th>Disposal</th><th>Status</th><th>Assignment</th>
                        <th>Initial</th><th>Other</th><th>Total</th><th>Entity</th><th>Currency</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody></tbody>
                <tfoot class="table-secondary"><tr><th></th><th colspan="13" class="text-end">Totals:</th><th id="totalInitialCost">0.00</th><th id="totalOtherCost">0.00</th><th id="totalOverallCost">0.00</th><th colspan="2"></th></tr></tfoot>
            </table>
        </div>
    </div>
</div>
