<!-- Company Modal -->
<div class="modal fade" id="companyModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5><i class="fas fa-building"></i> Company Management</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div class="card mb-4"><div class="card-header bg-primary text-white"><i class="fas fa-plus-circle"></i> Create Company</div><div class="card-body"><div class="row g-2"><div class="col-md-6"><label class="form-label required">Name</label><input type="text" id="newCompanyName" class="form-control" placeholder="ABC Corp"></div><div class="col-md-6"><label class="form-label required">Code</label><input type="text" id="newCompanyCode" class="form-control" placeholder="ABC" maxlength="10"></div><div class="col-md-6"><label class="form-label required">Currency</label><select id="newCompanyCurrency" class="form-control"><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="GHS">GHS</option><option value="NGN">NGN</option><option value="KES">KES</option><option value="ZAR">ZAR</option></select></div><div class="col-md-6"><label class="form-label">Address</label><input type="text" id="newCompanyAddress" class="form-control" placeholder="Address"></div><div class="col-md-4"><label>Phone</label><input type="text" id="newCompanyPhone" class="form-control"></div><div class="col-md-4"><label>Email</label><input type="email" id="newCompanyEmail" class="form-control"></div><div class="col-md-4"><label>Tax ID</label><input type="text" id="newCompanyTaxId" class="form-control"></div><div class="col-12"><button class="btn btn-success mt-2" onclick="createCompany()"><i class="fas fa-save"></i> Create</button></div></div></div></div>
    <div class="card"><div class="card-header bg-info text-white"><i class="fas fa-list"></i> Existing Companies</div><div class="card-body"><div id="companiesList">Loading...</div></div></div></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div></div></div></div>

<!-- Asset Modal -->
<div class="modal fade" id="assetModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5 id="modalTitle"><i class="fas fa-plus-circle"></i> Add Asset</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="assetForm"><div class="row g-2"><div class="col-md-6"><label class="form-label required">Asset No.</label><input type="text" class="form-control" id="asset_no" required></div><div class="col-md-6"><label class="form-label required">Category</label><select class="form-control" id="asset_category" required><option value="">Select</option></select></div><div class="col-md-6"><label class="form-label required">Description</label><input type="text" class="form-control" id="description" required></div><div class="col-md-6"><label class="form-label required">User</label><input type="text" class="form-control" id="user" required></div><div class="col-md-6"><label class="form-label">Serial No.</label><input type="text" class="form-control" id="serial_no"></div><div class="col-md-6"><label class="form-label required">Condition</label><select class="form-control" id="condition"><option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Poor">Poor</option><option value="Damaged">Damaged</option></select></div><div class="col-md-6"><label class="form-label required">Purchase Date</label><input type="date" class="form-control" id="purchase_date" required></div><div class="col-md-6"><label class="form-label required">Depr. Start</label><input type="date" class="form-control" id="depreciation_start_date" required></div><div class="col-md-6"><label class="form-label required">Useful Life (Yrs)</label><input type="number" step="0.1" class="form-control" id="useful_life_yrs" required></div><div class="col-md-6"><label class="form-label">Disposal Date</label><input type="date" class="form-control" id="disposal_date"></div><div class="col-md-6"><label class="form-label required">Initial Cost</label><input type="number" step="0.01" class="form-control" id="initial_cost" required></div><div class="col-md-6"><label class="form-label">Other Cost</label><input type="number" step="0.01" class="form-control" id="other_cost" value="0"></div><div class="col-md-6"><label class="form-label required">Entity</label><input type="text" class="form-control" id="entity" required></div><div class="col-md-6"><label class="form-label required">Currency</label><select class="form-control" id="currency"><option value="USD">USD</option><option value="EUR">EUR</option><option value="GBP">GBP</option><option value="GHS">GHS</option><option value="NGN">NGN</option></select></div></div><input type="hidden" id="asset_id"></form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="saveAsset()"><i class="fas fa-save"></i> Save Asset</button></div></div></div></div>

<!-- Assignment Modal -->
<div class="modal fade" id="assignmentModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5><i class="fas fa-user-plus"></i> Assign Asset</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="assignmentForm"><div class="mb-3"><label>Asset</label><input type="text" class="form-control" id="assignAssetInfo" readonly><input type="hidden" id="assignAssetId"></div><div class="mb-3"><label class="required">Assign To</label><select class="form-control" id="assignToUser" required><option value="">Select User</option></select></div><div class="mb-3"><label class="required">Assigned Date</label><input type="date" class="form-control" id="assignDate" required></div><div class="mb-3"><label>Expected Return</label><input type="date" class="form-control" id="assignExpectedReturn"></div><div class="mb-3"><label>Notes</label><textarea class="form-control" id="assignNotes" rows="2"></textarea></div></form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="saveAssignment()"><i class="fas fa-save"></i> Assign</button></div></div></div></div>

<!-- Return Modal -->
<div class="modal fade" id="returnModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5><i class="fas fa-undo-alt"></i> Asset Return</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="returnForm"><div class="row g-2"><div class="col-md-6"><label>Asset</label><input type="text" class="form-control" id="returnAssetInfo" readonly><input type="hidden" id="returnAssignmentId"><input type="hidden" id="returnAssetId"></div><div class="col-md-6"><label class="required">Returned By</label><input type="text" class="form-control" id="returnedBy" required></div><div class="col-md-6"><label class="required">Return Date</label><input type="date" class="form-control" id="returnDate" required></div><div class="col-md-6"><label class="required">Condition</label><select class="form-control" id="returnCondition"><option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Poor">Poor</option><option value="Damaged">Damaged</option></select></div><div class="col-12"><label>Damage Description</label><textarea class="form-control" id="returnDamageDesc" rows="2"></textarea></div><div class="col-md-6"><div class="form-check"><input type="checkbox" class="form-check-input" id="returnMaintenance"><label class="form-check-label">Maintenance Required</label></div></div><div class="col-md-6"><label>Received By</label><input type="text" class="form-control" id="returnReceivedBy"></div><div class="col-12"><label>Notes</label><textarea class="form-control" id="returnNotes" rows="2"></textarea></div><div class="col-12"><label>Signature</label><input type="text" class="form-control" id="returnSignature" placeholder="Full name"></div></div></form></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-success" onclick="saveReturn()"><i class="fas fa-check"></i> Confirm Return</button></div></div></div></div>

<!-- Edit Return Modal -->
<div class="modal fade" id="editReturnModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5><i class="fas fa-edit"></i> Edit Asset Return</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><form id="editReturnForm"><div class="row g-2"><div class="col-md-6"><label>Asset</label><input type="text" class="form-control" id="editReturnAssetInfo" readonly><input type="hidden" id="editReturnAssignmentId"><input type="hidden" id="editReturnFormId"><input type="hidden" id="editReturnAssetId"></div>
    <div class="col-md-6"><label class="required">Returned By</label><input type="text" class="form-control" id="editReturnedBy" required></div>
    <div class="col-md-6"><label class="required">Return Date</label><input type="date" class="form-control" id="editReturnDate" required></div>
    <div class="col-md-6"><label class="required">Condition</label><select class="form-control" id="editReturnCondition"><option value="New">New</option><option value="Good">Good</option><option value="Fair">Fair</option><option value="Poor">Poor</option><option value="Damaged">Damaged</option></select></div>
    <div class="col-12"><label>Damage Description</label><textarea class="form-control" id="editReturnDamageDesc" rows="2"></textarea></div>
    <div class="col-md-6"><div class="form-check"><input type="checkbox" class="form-check-input" id="editReturnMaintenance"><label class="form-check-label">Maintenance Required</label></div></div>
    <div class="col-md-6"><label>Received By</label><input type="text" class="form-control" id="editReturnReceivedBy"></div>
    <div class="col-12"><label>Notes</label><textarea class="form-control" id="editReturnNotes" rows="2"></textarea></div>
    <div class="col-12"><label>Signature</label><input type="text" class="form-control" id="editReturnSignature" placeholder="Full name"></div></div></form></div>
    <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" onclick="saveEditReturn()"><i class="fas fa-save"></i> Update Return</button>
        <button class="btn btn-danger" onclick="deleteReturn()"><i class="fas fa-trash"></i> Delete Return</button>
    </div></div></div></div>

<!-- Import Modal -->
<div class="modal fade" id="importModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5><i class="fas fa-file-import"></i> Import Assets</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><div class="alert alert-info"><i class="fas fa-info-circle"></i> Use the template from Downloads. Sheet name must be "Asset Template".</div><input type="file" class="form-control" id="importFile" accept=".xlsx,.xls"></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-primary" onclick="uploadFile()"><i class="fas fa-upload"></i> Upload</button></div></div></div></div>

<!-- Asset History Detail Modal -->
<div class="modal fade" id="historyDetailModal" tabindex="-1"><div class="modal-dialog modal-lg"><div class="modal-content"><div class="modal-header"><h5><i class="fas fa-history"></i> Asset History Detail</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body" id="historyDetailBody"><div class="text-center"><i class="fas fa-spinner fa-spin"></i> Loading...</div></div>
    <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div></div></div></div>
