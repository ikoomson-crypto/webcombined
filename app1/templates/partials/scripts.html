<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // ============================================================
    // MAIN CLASS
    // ============================================================
    class PaymentSystem {
        constructor() {
            this.currentPage = 'dashboard';
            this.currentCompany = null;
            this.currentStatusFilter = 'all';
            this.currentSupplierFilter = 'all';
            this.currentDateFilter = '';
            this.modalInstance = new bootstrap.Modal(document.getElementById('itemModal'));
            this.companyModalInstance = new bootstrap.Modal(document.getElementById('companyModal'));
            this.init();
        }

        init() {
            this.loadCompanyInfo();
            this.setupEventListeners();
            this.loadPage('dashboard');
        }

        setupEventListeners() {
            document.querySelectorAll('.nav-item[data-page]').forEach(item => {
                item.addEventListener('click', (e) => {
                    const page = item.dataset.page;
                    if (page === 'switch-company') {
                        this.showCompanySwitch();
                        return;
                    }
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    item.classList.add('active');
                    this.loadPage(page);
                });
            });

            document.getElementById('addButton').addEventListener('click', () => {
                this.showAddForm();
            });

            document.getElementById('importBtn').addEventListener('click', () => {
                document.getElementById('fileInput').click();
            });

            document.getElementById('fileInput').addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    this.importData(e.target.files[0]);
                }
            });

            document.getElementById('exportBtn').addEventListener('click', () => {
                this.exportData();
            });

            document.getElementById('templateBtn').addEventListener('click', () => {
                this.downloadTemplate();
            });
        }

        loadCompanyInfo() {
            $.ajax({
                url: 'api/active-company',
                method: 'GET',
                success: (data) => {
                    this.currentCompany = data;
                    document.getElementById('companyBadge').textContent =
                        `${data.name} (${data.currency})`;
                }
            });
        }

        loadPage(page) {
            this.currentPage = page;
            const titles = {
                'dashboard': 'Dashboard',
                'suppliers': 'Suppliers',
                'customers': 'Customers',
                'supplier-payments': 'Supplier Payments',
                'customer-payments': 'Customer Payments',
                'payment-schedule': 'Payment Schedule',
                'cashflow': 'Cashflow Report',
                'supplier-payment-report': 'Supplier Payment Report',
                'companies': 'Company Management'
            };
            document.getElementById('pageTitle').innerHTML =
                `<i class="bi ${this.getPageIcon(page)}"></i> ${titles[page] || page}`;

            const addBtn = document.getElementById('addButton');
            const btnGroup = document.querySelector('.btn-group');

            if (page === 'dashboard' || page === 'payment-schedule' || page === 'cashflow' ||
                page === 'supplier-payment-report' || page === 'companies' || page === 'switch-company') {
                addBtn.style.display = 'none';
                btnGroup.style.display = 'none';
            } else {
                addBtn.style.display = 'inline-block';
                btnGroup.style.display = 'inline-flex';
            }

            this.fetchPageData(page);
        }

        getPageIcon(page) {
            const icons = {
                'dashboard': 'bi-speedometer2',
                'suppliers': 'bi-people',
                'customers': 'bi-person',
                'supplier-payments': 'bi-arrow-up-circle',
                'customer-payments': 'bi-arrow-down-circle',
                'payment-schedule': 'bi-calendar-check',
                'cashflow': 'bi-cash-stack',
                'supplier-payment-report': 'bi-file-earmark-text',
                'companies': 'bi-building'
            };
            return icons[page] || 'bi-table';
        }

        fetchPageData(page) {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            let url = `api/${page}`;
            if (page === 'dashboard') {
                url = 'api/dashboard/stats';
            } else if (page === 'cashflow') {
                const year = new Date().getFullYear();
                url = `api/reports/cashflow?start_date=${year}-01-01&end_date=${year}-12-31&opening_balance=0`;
            } else if (page === 'supplier-payment-report') {
                url = 'api/reports/supplier-payments';
            } else if (page === 'companies') {
                url = 'api/companies';
            } else if (page === 'payment-schedule') {
                url = 'api/payment-schedule';
            } else if (page === 'switch-company') {
                this.showCompanySwitch();
                loading.classList.remove('active');
                return;
            }

            $.ajax({
                url: url,
                method: 'GET',
                success: (data) => {
                    loading.classList.remove('active');
                    if (page === 'dashboard') {
                        this.renderDashboard(data);
                    } else if (page === 'cashflow') {
                        this.renderCashflowReport(data);
                    } else if (page === 'supplier-payment-report') {
                        this.renderSupplierPaymentReport(data);
                    } else if (page === 'companies') {
                        this.renderCompanies(data);
                    } else if (page === 'supplier-payments') {
                        this.renderSupplierPaymentTable(page, data);
                    } else if (page === 'payment-schedule') {
                        this.renderPaymentSchedule(data);
                    } else {
                        this.renderTable(page, data);
                    }
                },
                error: (err) => {
                    loading.classList.remove('active');
                    this.showError('Failed to load data');
                    console.error('Error:', err);
                }
            });
        }

        // ============================================================
        // DASHBOARD
        // ============================================================
        renderDashboard(data) {
            const container = document.getElementById('contentArea');
            const currency = this.currentCompany?.currency || 'GHS';

            let html = `
                <div class="fade-in">
                    <div class="row g-3 mb-4">
                        <div class="col-md-3">
                            <div class="summary-card bg-primary dashboard-stat" onclick="app.loadPage('suppliers')">
                                <h6><i class="bi bi-people"></i> Total Suppliers</h6>
                                <h4>${data.total_suppliers || 0}</h4>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="summary-card bg-success dashboard-stat" onclick="app.loadPage('customers')">
                                <h6><i class="bi bi-person"></i> Total Customers</h6>
                                <h4>${data.total_customers || 0}</h4>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="summary-card bg-warning dashboard-stat" onclick="app.loadPage('supplier-payments')">
                                <h6><i class="bi bi-arrow-up-circle"></i> Supplier Payments</h6>
                                <h4>${data.total_supplier_payments || 0}</h4>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="summary-card bg-info dashboard-stat" onclick="app.loadPage('customer-payments')">
                                <h6><i class="bi bi-arrow-down-circle"></i> Customer Payments</h6>
                                <h4>${data.total_customer_payments || 0}</h4>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <div class="summary-card bg-success">
                                <h6><i class="bi bi-arrow-down-circle"></i> Total Inflows</h6>
                                <h4>${this.formatCurrency(data.total_customer_amount || 0)}</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="summary-card bg-danger">
                                <h6><i class="bi bi-arrow-up-circle"></i> Total Outflows</h6>
                                <h4>${this.formatCurrency(data.total_supplier_amount || 0)}</h4>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="summary-card ${(data.total_customer_amount || 0) - (data.total_supplier_amount || 0) >= 0 ? 'bg-success' : 'bg-danger'}">
                                <h6><i class="bi bi-calculator"></i> Net Cashflow</h6>
                                <h4>${this.formatCurrency((data.total_customer_amount || 0) - (data.total_supplier_amount || 0))}</h4>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0"><i class="bi bi-arrow-up-circle text-danger"></i> Supplier Payment Status</h6>
                                </div>
                                <div class="card-body">
                                    ${data.supplier_status && data.supplier_status.length > 0 ? `
                                        <table class="table table-sm">
                                            <thead>
                                                <tr>
                                                    <th>Status</th>
                                                    <th class="text-end">Count</th>
                                                    <th class="text-end">Total</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${data.supplier_status.map(s => `
                                                    <tr>
                                                        <td>${this.getStatusBadge(s.status)}</td>
                                                        <td class="text-end">${s.count}</td>
                                                        <td class="text-end">${this.formatCurrency(s.total)}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    ` : '<p class="text-muted text-center">No supplier payments</p>'}
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header">
                                    <h6 class="mb-0"><i class="bi bi-arrow-down-circle text-success"></i> Customer Payment Status</h6>
                                </div>
                                <div class="card-body">
                                    ${data.customer_status && data.customer_status.length > 0 ? `
                                        <table class="table table-sm">
                                            <thead>
                                                <tr>
                                                    <th>Status</th>
                                                    <th class="text-end">Count</th>
                                                    <th class="text-end">Total</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${data.customer_status.map(s => `
                                                    <tr>
                                                        <td>${this.getStatusBadge(s.status)}</td>
                                                        <td class="text-end">${s.count}</td>
                                                        <td class="text-end">${this.formatCurrency(s.total)}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    ` : '<p class="text-muted text-center">No customer payments</p>'}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0"><i class="bi bi-clock-history"></i> Recent Supplier Payments</h6>
                                    <button class="btn btn-sm btn-outline-primary view-all-btn" onclick="app.loadPage('supplier-payments')">View All</button>
                                </div>
                                <div class="card-body">
                                    ${data.recent_supplier_payments && data.recent_supplier_payments.length > 0 ? `
                                        <table class="table table-sm">
                                            <thead>
                                                <tr>
                                                    <th>Supplier</th>
                                                    <th>Description</th>
                                                    <th class="text-end">Amount</th>
                                                    <th>Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${data.recent_supplier_payments.map(p => `
                                                    <tr>
                                                        <td>${p.supplier_name}</td>
                                                        <td>${p.payment_description || '-'}</td>
                                                        <td class="text-end">${this.formatCurrency(p.amount)}</td>
                                                        <td>${this.getStatusBadge(p.status)}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    ` : '<p class="text-muted text-center">No recent supplier payments</p>'}
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="card">
                                <div class="card-header d-flex justify-content-between align-items-center">
                                    <h6 class="mb-0"><i class="bi bi-clock-history"></i> Recent Customer Payments</h6>
                                    <button class="btn btn-sm btn-outline-primary view-all-btn" onclick="app.loadPage('customer-payments')">View All</button>
                                </div>
                                <div class="card-body">
                                    ${data.recent_customer_payments && data.recent_customer_payments.length > 0 ? `
                                        <table class="table table-sm">
                                            <thead>
                                                <tr>
                                                    <th>Customer</th>
                                                    <th>Description</th>
                                                    <th class="text-end">Amount</th>
                                                    <th>Status</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                ${data.recent_customer_payments.map(p => `
                                                    <tr>
                                                        <td>${p.customer_name}</td>
                                                        <td>${p.service_description || '-'}</td>
                                                        <td class="text-end">${this.formatCurrency(p.amount)}</td>
                                                        <td>${this.getStatusBadge(p.status)}</td>
                                                    </tr>
                                                `).join('')}
                                            </tbody>
                                        </table>
                                    ` : '<p class="text-muted text-center">No recent customer payments</p>'}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML = html;
        }

        // ============================================================
        // CASHFLOW REPORT WITH HORIZONTAL MONTHS & DETAILED ITEMS
        // ============================================================
        renderCashflowReport(data) {
            const container = document.getElementById('contentArea');

            const months = data.months || [];
            const rowData = data.row_data || {};
            const monthlyData = data.monthly_data || {};

            const totalInflows = data.total_inflows || 0;
            const totalOutflows = data.total_outflows || 0;
            const totalNet = data.total_net || 0;

            const currency = this.currentCompany?.currency || 'GHS';

            // Filter data by status
            const filteredMonthlyData = {};
            months.forEach(month => {
                const m = monthlyData[month] || {};
                filteredMonthlyData[month] = {
                    ...m,
                    inflow_items: (m.inflow_items || []).filter(item =>
                        this.currentStatusFilter === 'all' || item.status === this.currentStatusFilter
                    ),
                    outflow_items: (m.outflow_items || []).filter(item =>
                        this.currentStatusFilter === 'all' || item.status === this.currentStatusFilter
                    )
                };
            });

            // Collect unique inflow descriptions
            const allInflowDescriptions = [];
            months.forEach(month => {
                const items = filteredMonthlyData[month]?.inflow_items || [];
                items.forEach(item => {
                    const desc = item.description || 'Customer Payment';
                    if (!allInflowDescriptions.includes(desc)) {
                        allInflowDescriptions.push(desc);
                    }
                });
            });
            allInflowDescriptions.sort();

            // Collect unique outflow descriptions
            const allOutflowDescriptions = [];
            months.forEach(month => {
                const items = filteredMonthlyData[month]?.outflow_items || [];
                items.forEach(item => {
                    const desc = item.description || 'Supplier Payment';
                    if (!allOutflowDescriptions.includes(desc)) {
                        allOutflowDescriptions.push(desc);
                    }
                });
            });
            allOutflowDescriptions.sort();

            const monthOrderDisplay = months.length > 0 ?
                `<span class="month-order">(${months.length} months - ${months[0]} to ${months[months.length-1]})</span>` : '';

            let html = `
                <div class="fade-in">
                    <div class="card">
                        <div class="card-header">
                            <div class="row align-items-center">
                                <div class="col-md-6">
                                    <h5 class="mb-0">
                                        <i class="bi bi-cash-stack"></i> Cashflow Report
                                        <small class="text-muted ms-2">${data.start_date} to ${data.end_date}</small>
                                        ${monthOrderDisplay}
                                    </h5>
                                </div>
                                <div class="col-md-6 text-end">
                                    <button class="btn btn-success btn-sm me-2" onclick="app.exportCashflowExcel()">
                                        <i class="bi bi-file-earmark-excel"></i> Export Excel
                                    </button>
                                    <button class="btn btn-danger btn-sm" onclick="app.exportCashflowPDF()">
                                        <i class="bi bi-file-earmark-pdf"></i> Export PDF
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <!-- Filters -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-3">
                                    <label class="form-label">Start Date</label>
                                    <input type="date" class="form-control" id="startDate" value="${data.start_date}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">End Date</label>
                                    <input type="date" class="form-control" id="endDate" value="${data.end_date}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Opening Balance</label>
                                    <input type="number" class="form-control" id="openingBalance" step="0.01" value="${data.opening_balance}">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">&nbsp;</label>
                                    <button class="btn btn-primary w-100" onclick="app.runCashflowReport()">
                                        <i class="bi bi-play-fill"></i> Run Report
                                    </button>
                                </div>
                            </div>

                            <!-- Status Filter -->
                            <div class="row mb-4">
                                <div class="col-md-12">
                                    <label class="form-label">Filter by Status</label>
                                    <div class="status-filter">
                                        <button class="btn btn-outline-secondary ${this.currentStatusFilter === 'all' ? 'active-filter' : ''}"
                                                onclick="app.setStatusFilter('all')">
                                            All
                                        </button>
                                        <button class="btn btn-outline-success ${this.currentStatusFilter === 'Paid' ? 'active-filter' : ''}"
                                                onclick="app.setStatusFilter('Paid')">
                                            Paid
                                        </button>
                                        <button class="btn btn-outline-warning ${this.currentStatusFilter === 'Pending' ? 'active-filter' : ''}"
                                                onclick="app.setStatusFilter('Pending')">
                                            Pending
                                        </button>
                                        <button class="btn btn-outline-danger ${this.currentStatusFilter === 'Overdue' ? 'active-filter' : ''}"
                                                onclick="app.setStatusFilter('Overdue')">
                                            Overdue
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <!-- Currency Header -->
                            <div class="currency-header">
                                <i class="bi bi-currency-dollar"></i> Currency: ${currency}
                            </div>

                            <!-- Summary Cards -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-3">
                                    <div class="summary-card bg-success">
                                        <h6>Opening Balance</h6>
                                        <h4>${this.formatCurrency(data.opening_balance)}</h4>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="summary-card bg-info">
                                        <h6>Total Inflows</h6>
                                        <h4>${this.formatCurrency(totalInflows)}</h4>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="summary-card bg-warning">
                                        <h6>Total Outflows</h6>
                                        <h4>${this.formatCurrency(totalOutflows)}</h4>
                                    </div>
                                </div>
                                <div class="col-md-3">
                                    <div class="summary-card ${totalNet >= 0 ? 'bg-success' : 'bg-danger'}">
                                        <h6>Net Cashflow</h6>
                                        <h4>${this.formatCurrency(totalNet)}</h4>
                                    </div>
                                </div>
                            </div>

                            <!-- ========================================================== -->
                            <!-- HORIZONTAL MONTHLY TABLE WITH DETAILS                       -->
                            <!-- ========================================================== -->
                            <div class="table-responsive">
                                <table class="table table-hover table-bordered">
                                    <thead class="table-dark">
                                        <tr>
                                            <th style="min-width: 180px;">Category / Description</th>
                                            ${months.map(m => `<th class="text-center" style="min-width: 120px;">${m}</th>`).join('')}
                                            <th class="text-end" style="min-width: 120px;">Total</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <!-- Opening Balance Row -->
                                        <tr class="table-secondary">
                                            <td><strong>Opening Balance</strong></td>
                                            ${rowData.opening_balances?.map(val => `
                                                <td class="text-end">${this.formatCurrency(val)}</td>
                                            `).join('')}
                                            <td class="text-end"><strong>${this.formatCurrency(data.opening_balance)}</strong></td>
                                        </tr>

                                        <!-- Inflows Header -->
                                        <tr class="table-success">
                                            <td><strong><i class="bi bi-arrow-down-circle"></i> INFLOWS</strong></td>
                                            ${rowData.inflows?.map(val => `
                                                <td class="text-end"><strong>${this.formatCurrency(val)}</strong></td>
                                            `).join('')}
                                            <td class="text-end"><strong>${this.formatCurrency(totalInflows)}</strong></td>
                                        </tr>

                                        <!-- Inflow Details - Each description as a row -->
                                        ${allInflowDescriptions.length > 0 ? allInflowDescriptions.map(desc => {
                                            let descTotal = 0;
                                            months.forEach(month => {
                                                const items = filteredMonthlyData[month]?.inflow_items || [];
                                                const item = items.find(i => (i.description || 'Customer Payment') === desc);
                                                if (item) descTotal += item.amount;
                                            });
                                            return `
                                                <tr class="detail-row">
                                                    <td style="padding-left: 30px;">
                                                        <span class="text-muted">${desc}</span>
                                                    </td>
                                                    ${months.map(month => {
                                                        const items = filteredMonthlyData[month]?.inflow_items || [];
                                                        const item = items.find(i => (i.description || 'Customer Payment') === desc);
                                                        const amount = item ? item.amount : 0;
                                                        const status = item ? item.status : '';
                                                        const customer = item ? item.customer : '';
                                                        return `
                                                            <td class="text-end">
                                                                ${amount > 0 ? `
                                                                    <span class="text-success fw-bold">${this.formatCurrency(amount)}</span>
                                                                    <br>
                                                                    <small class="text-muted">${customer}</small>
                                                                    <br>
                                                                    <span class="badge ${status === 'Paid' ? 'bg-success' : status === 'Pending' ? 'bg-warning' : 'bg-danger'}">
                                                                        ${status || 'Pending'}
                                                                    </span>
                                                                ` : '-'}
                                                            </td>
                                                        `;
                                                    }).join('')}
                                                    <td class="text-end">
                                                        ${descTotal > 0 ? `<strong class="text-success">${this.formatCurrency(descTotal)}</strong>` : '-'}
                                                    </td>
                                                </tr>
                                            `;
                                        }).join('') : `
                                            <tr class="detail-row">
                                                <td style="padding-left: 30px;" colspan="${months.length + 2}" class="text-muted text-center">
                                                    No inflow transactions found
                                                </td>
                                            </tr>
                                        `}

                                        <!-- Outflows Header -->
                                        <tr class="table-danger">
                                            <td><strong><i class="bi bi-arrow-up-circle"></i> OUTFLOWS</strong></td>
                                            ${rowData.outflows?.map(val => `
                                                <td class="text-end"><strong>${this.formatCurrency(val)}</strong></td>
                                            `).join('')}
                                            <td class="text-end"><strong>${this.formatCurrency(totalOutflows)}</strong></td>
                                        </tr>

                                        <!-- Outflow Details - Each description as a row -->
                                        ${allOutflowDescriptions.length > 0 ? allOutflowDescriptions.map(desc => {
                                            let descTotal = 0;
                                            months.forEach(month => {
                                                const items = filteredMonthlyData[month]?.outflow_items || [];
                                                const item = items.find(i => (i.description || 'Supplier Payment') === desc);
                                                if (item) descTotal += item.amount;
                                            });
                                            return `
                                                <tr class="detail-row">
                                                    <td style="padding-left: 30px;">
                                                        <span class="text-muted">${desc}</span>
                                                    </td>
                                                    ${months.map(month => {
                                                        const items = filteredMonthlyData[month]?.outflow_items || [];
                                                        const item = items.find(i => (i.description || 'Supplier Payment') === desc);
                                                        const amount = item ? item.amount : 0;
                                                        const status = item ? item.status : '';
                                                        const supplier = item ? item.supplier : '';
                                                        return `
                                                            <td class="text-end">
                                                                ${amount > 0 ? `
                                                                    <span class="text-danger fw-bold">${this.formatCurrency(amount)}</span>
                                                                    <br>
                                                                    <small class="text-muted">${supplier}</small>
                                                                    <br>

        exportCashflowExcel() {

            const openingBalance = document.getElementById('openingBalance')?.value || 0;

            if (!startDate || !endDate) {
                this.showError('Please select start and end dates');
                return;
            }

            Swal.fire({
                title: 'Exporting Excel...',
                text: 'Please wait while your report is generated.',
                allowOutsideClick: false,
                didOpen: () => {
                    Swal.showLoading();
                }
            });

            $.ajax({
                url: 'api/reports/cashflow/export/excel',
                method: 'POST',
                data: JSON.stringify({
                    start_date: startDate,
                    end_date: endDate,
                    opening_balance: parseFloat(openingBalance) || 0
                }),
                contentType: 'application/json',
                xhrFields: {
                    responseType: 'blob'
                },
                success: (data, status, xhr) => {
                    Swal.close();

                    const contentType = xhr.getResponseHeader('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const reader = new FileReader();
                        reader.onload = function() {
                            try {
                                const response = JSON.parse(reader.result);
                                app.showError(response.error || 'Failed to export Excel');
                            } catch (e) {
                                app.showError('Failed to export Excel');
                            }
                        };
                        reader.readAsText(data);
                        return;
                    }

                    const blob = new Blob([data], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `cashflow_report_${new Date().toISOString().slice(0,10)}.xlsx`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);

                    this.showSuccess('Excel report exported successfully!');

                    Swal.close();
                    let errorMsg = 'Failed to export Excel';

        toggleAllSchedulePayments(masterCheckbox) {
            const checkboxes = document.querySelectorAll('.schedule-payment-checkbox');
            checkboxes.forEach(cb => {
                cb.checked = masterCheckbox.checked;
                const event = new Event('change');
                cb.dispatchEvent(event);
            });
            this.updateScheduleSelectionCount();
        }

        updateScheduleSelectionCount() {
            const checkboxes = document.querySelectorAll('.schedule-payment-checkbox:checked');
            const count = checkboxes.length;
            const selectedCount = document.getElementById('selectedCount');
            const selectedAmount = document.getElementById('selectedAmount');
            const exportBtn = document.getElementById('exportPdfBtn');

            if (selectedCount) {
                selectedCount.textContent = count;
            }

            let total = 0;
            checkboxes.forEach(cb => {
                const row = cb.closest('tr');
                if (row) {
                    const amountCell = row.querySelector('td:nth-child(7)');
                    if (amountCell) {
                        const amountText = amountCell.textContent.replace(/[^0-9.]/g, '');
                        const amount = parseFloat(amountText);
                        if (!isNaN(amount)) {
                            total += amount;
                        }
                    }
                }
            });

            if (selectedAmount) {
                selectedAmount.textContent = `Total: ${this.formatCurrency(total)}`;
            }

            if (exportBtn) {
                exportBtn.disabled = count === 0;
            }
        }

        clearPaymentSelection() {
            document.querySelectorAll('.schedule-payment-checkbox').forEach(cb => {
                cb.checked = false;
                const event = new Event('change');
                cb.dispatchEvent(event);
            });
            this.updateScheduleSelectionCount();
        }

            const checkboxes = document.querySelectorAll('.schedule-payment-checkbox:checked');
            if (checkboxes.length === 0) {
                this.showError('Please select at least one payment to export');
                return;
            }

            const paymentIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

            if (!confirm(`Are you sure you want to export ${paymentIds.length} payment(s) to PDF?`)) return;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            console.log('Exporting payment IDs:', paymentIds);

            $.ajax({
                url: 'api/payment-schedule/export-pdf',
                method: 'POST',
                data: JSON.stringify({
                    payment_ids: paymentIds,
                    payment_type: 'all'

                contentType: 'application/json',

                    responseType: 'blob'

                        reader.onload = function() {

        applyScheduleFilters() {
            const type = document.getElementById('scheduleTypeFilter').value;
            const supplierId = document.getElementById('scheduleSupplierFilter').value;
            const status = document.getElementById('scheduleStatusFilter').value;
            const startDate = document.getElementById('scheduleStartDate').value;
            const endDate = document.getElementById('scheduleEndDate').value;

            this.runPaymentSchedule(type, supplierId, status, startDate, endDate);
        }

        runPaymentSchedule(type, supplierId, status, startDate, endDate) {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            let url = 'api/payment-schedule?';
            if (type && type !== 'all') url += `type=${type}&`;
            if (supplierId && supplierId !== 'all') url += `supplier_id=${supplierId}&`;
            if (status && status !== 'all') url += `status=${status}&`;
            if (startDate) url += `start_date=${startDate}&`;
            if (endDate) url += `end_date=${endDate}`;

            $.ajax({
                url: url,
                method: 'GET',
                success: (data) => {
                    loading.classList.remove('active');
                    this.renderPaymentSchedule(data);
                    this.showSuccess(`Found ${data.payments.length} payments`);
                },
                error: (err) => {
                    loading.classList.remove('active');
                    this.showError('Failed to load payment schedule');
                    console.error('Error:', err);
                }
            });
        }

        applySupplierFilters() {
            const supplierFilter = document.getElementById('supplierFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            this.currentSupplierFilter = supplierFilter;
            this.currentStatusFilter = statusFilter;
            this.currentDateFilter = dateFilter;

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            $.ajax({
                url: 'api/supplier-payments',
                method: 'GET',
                success: (allData) => {
                    loading.classList.remove('active');

                    let filteredData = allData;

                    if (supplierFilter !== 'all') {
                        filteredData = filteredData.filter(item => item.supplier_name === supplierFilter);
                    }

                    if (statusFilter !== 'all') {
                        filteredData = filteredData.filter(item => item.status === statusFilter);
                    }

                    if (dateFilter) {
                        filteredData = filteredData.filter(item => {
                            return (item.due_date && item.due_date.startsWith(dateFilter)) ||
                                   (item.invoice_date && item.invoice_date.startsWith(dateFilter));
                        });
                    }

                    this.renderSupplierPaymentTable('supplier-payments', filteredData);
                    this.showSuccess(`Filter applied: ${filteredData.length} records found`);
                },
                error: (err) => {
                    loading.classList.remove('active');
                    this.showError('Failed to load data');
                    console.error('Error:', err);
                }
            });
        }

        clearSupplierFilters() {
            document.getElementById('supplierFilter').value = 'all';
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('dateFilter').value = '';

            this.currentSupplierFilter = 'all';
            this.currentStatusFilter = 'all';
            this.currentDateFilter = '';

            this.loadPage('supplier-payments');

        deleteCompany(companyId) {
            if (!confirm('Are you sure you want to delete this company?')) return;

            $.ajax({
                url: `api/companies/${companyId}`,
                method: 'DELETE',
                success: (response) => {
                    this.loadPage('companies');
                    this.showSuccess(response.message);
                },
                error: (err) => {
                    const errorMsg = err.responseJSON?.error || 'Failed to delete company';
                    this.showError(errorMsg);
                }
            });

        activateCompany(companyId) {
            if (!confirm('Are you sure you want to activate this company? This will deactivate all other companies.')) return;

            $.ajax({
                url: `api/companies/${companyId}`,
                method: 'PUT',
                data: JSON.stringify({ is_active: true }),
                contentType: 'application/json',
                success: () => {
                    this.loadPage('companies');
                    this.loadCompanyInfo();
                    this.showSuccess('Company activated successfully');
                },
                error: () => {
                    this.showError('Failed to activate company');

        setStatusFilter(status) {
            this.currentStatusFilter = status;
            const startDate = document.getElementById('startDate')?.value;
            const endDate = document.getElementById('endDate')?.value;
            const openingBalance = document.getElementById('openingBalance')?.value || 0;

            if (startDate && endDate) {
                const loading = document.getElementById('loadingOverlay');
                loading.classList.add('active');

                $.ajax({
                    url: `api/reports/cashflow?start_date=${startDate}&end_date=${endDate}&opening_balance=${openingBalance}`,
                    method: 'GET',
                    success: (data) => {
                        loading.classList.remove('active');
                        this.renderCashflowReport(data);
                    },
                    error: (err) => {
                        loading.classList.remove('active');
                        this.showError('Failed to refresh report');
                        console.error('Error:', err);
                    }
                });
            }

        runCashflowReport() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const openingBalance = document.getElementById('openingBalance').value || 0;

            if (!startDate || !endDate) {
                this.showError('Please select start and end dates');
                return;
            }

            if (startDate > endDate) {
                this.showError('Start date cannot be after end date');
                return;
            }

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            $.ajax({
                url: `api/reports/cashflow?start_date=${startDate}&end_date=${endDate}&opening_balance=${openingBalance}`,
                method: 'GET',
                success: (data) => {
                    loading.classList.remove('active');
                    this.renderCashflowReport(data);
                    this.showSuccess(`Cashflow report generated for ${startDate} to ${endDate}`);
                },
                error: (err) => {
                    loading.classList.remove('active');
                    this.showError('Failed to generate report');
                    console.error('Error:', err);
                }
            });
        }

                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Status</label>
                                    <select class="form-select" name="status">
                                        <option value="Pending">Pending</option>
                                        <option value="Paid">Paid</option>
                                        <option value="Overdue">Overdue</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Due Date</label>
                                    <input type="date" class="form-control" name="due_date">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Invoice Date</label>
                                    <input type="date" class="form-control" name="invoice_date">
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </form>
                `;
            }

            return '<p>Form not available</p>';
        }

        populateEntityDropdown(page) {
            const isSupplier = page === 'supplier-payments';
            const entityType = isSupplier ? 'supplier' : 'customer';
            const select = document.querySelector(`select[name="${entityType}_id"]`);

            if (!select) return;

            select.innerHTML = '<option value="">Loading...</option>';

            $.ajax({
                url: `api/${entityType}s`,
                method: 'GET',
                success: (data) => {
                    select.innerHTML = '<option value="">Select</option>';
                    if (data.length === 0) {
                        select.innerHTML += '<option value="" disabled>No records found</option>';
                    } else {
                        data.forEach(item => {
                            select.innerHTML += `<option value="${item.id}">${item.name}</option>`;
                        });
                    }
                },
                error: () => {
                    select.innerHTML = '<option value="">Error loading data</option>';
                    this.showError('Failed to load ' + entityType + 's');
                }
            });
        }

        editItem(page, id) {
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            title.textContent = `Edit ${this.getPageTitle(page)}`;

            $.ajax({
                url: `api/${page}/${id}`,
                method: 'GET',
                success: (data) => {
                    body.innerHTML = this.getFormHTML(page);
                    this.modalInstance.show();

                    const form = document.getElementById('entityForm');

                    Object.keys(data).forEach(key => {
                        const input = form.querySelector(`[name="${key}"]`);
                        if (input) {
                            if (input.type === 'date' && data[key]) {
                                input.value = data[key].split('T')[0];
                            } else if (key === 'amount' && data[key]) {
                                input.value = parseFloat(data[key]).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                            } else if (input.tagName === 'SELECT') {
                                setTimeout(() => {
                                    input.value = data[key];
                                }, 300);
                            } else {
                                input.value = data[key] || '';
                            }
                        }
                    });

                    if (page === 'supplier-payments' || page === 'customer-payments') {
                        this.populateEntityDropdown(page);
                        setTimeout(() => {
                            const isSupplier = page === 'supplier-payments';
                            const entityType = isSupplier ? 'supplier' : 'customer';
                            const select = form.querySelector(`[name="${entityType}_id"]`);
                            if (select && data[`${entityType}_id`]) {
                                select.value = data[`${entityType}_id`];
                            }
                        }, 500);
                    }

                    form.dataset.id = id;
                    form.dataset.action = 'update';
                },
                error: (err) => {
                    console.error('Edit error:', err);
                    this.showError('Failed to load item data');
                }
            });
        }

        deleteItem(page, id) {
            if (!confirm('Are you sure you want to delete this item?')) return;

            $.ajax({
                url: `api/${page}/${id}`,
                method: 'DELETE',
                success: () => {
                    this.loadPage(this.currentPage);
                    this.showSuccess('Item deleted successfully');
                },
                error: () => {
                    this.showError('Failed to delete item');
                }
            });
        }

        renderTable(page, data) {
            const container = document.getElementById('contentArea');
            let html = '<div class="table-container fade-in">';

            const bulkDeletePages = ['suppliers', 'supplier-payments', 'customer-payments'];
            if (bulkDeletePages.includes(page)) {
                const methodName = this.getBulkDeleteMethodName(page);
                const selectAllMethod = this.getSelectAllMethodName(page);
                html += `
                    <div class="mb-3">
                        <button class="btn btn-danger btn-sm" onclick="app.${methodName}()">
                            <i class="bi bi-trash3"></i> Delete Selected
                        </button>
                        <button class="btn btn-secondary btn-sm" onclick="app.${selectAllMethod}()">
                            <i class="bi bi-check-all"></i> Select All
                        </button>
                    </div>
                `;
            }

            html += '<table class="table table-hover"><thead><tr>';

            if (bulkDeletePages.includes(page)) {
                html += '<th><input type="checkbox" id="selectAllCheckbox" onchange="app.toggleAllCheckboxes(this)"></th>';
            }

            const columns = this.getTableColumns(page);
            columns.forEach(col => {
                html += `<th>${col.label}</th>`;
            });
            html += '<th>Actions</th></tr></thead><tbody>';

            if (data.length === 0) {
                const colspan = columns.length + (bulkDeletePages.includes(page) ? 2 : 1);
                html += `<tr><td colspan="${colspan}" class="text-center text-muted py-4">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                    No records found
                </td></tr>`;
            } else {
                data.forEach(item => {
                    html += '<tr>';
                    if (bulkDeletePages.includes(page)) {
                        const name = this.getCheckboxName(page);
                        html += `<td><input type="checkbox" name="${name}" value="${item.id}"></td>`;
                    }
                    columns.forEach(col => {
                        let value = item[col.key] || '';
                        if (col.key === 'status') {
                            value = this.getStatusBadge(value);
                        }
                        if (col.key === 'amount' || col.key === 'amount_formatted') {
                            value = this.formatCurrency(item.amount || 0);
                        }
                        html += `<td>${value}</td>`;
                    });
                    html += `<td>
                        <button class="btn btn-sm btn-action btn-edit" onclick="app.editItem('${page}', ${item.id})">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-action btn-delete" onclick="app.deleteItem('${page}', ${item.id})">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>`;
                    html += '</tr>';
                });
            }

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        getTableColumns(page) {
            const columns = {
                'suppliers': [
                    { key: 'name', label: 'Name' },
                    { key: 'address', label: 'Address' },
                    { key: 'telephone', label: 'Telephone' },
                    { key: 'bank_name', label: 'Bank' },
                    { key: 'account_number', label: 'Account No' }
                ],
                'customers': [
                    { key: 'name', label: 'Name' },
                    { key: 'address', label: 'Address' },
                    { key: 'telephone', label: 'Telephone' }
                ],
                'supplier-payments': [
                    { key: 'supplier_name', label: 'Supplier' },
                    { key: 'payment_description', label: 'Description' },
                    { key: 'invoice_ref', label: 'Invoice Ref' },
                    { key: 'amount', label: 'Amount' },
                    { key: 'type', label: 'Type' },
                    { key: 'due_date', label: 'Due Date' },
                    { key: 'status', label: 'Status' }
                ],
                'customer-payments': [
                    { key: 'customer_name', label: 'Customer' },
                    { key: 'service_description', label: 'Service' },
                    { key: 'invoice_ref', label: 'Invoice Ref' },
                    { key: 'amount', label: 'Amount' },
                    { key: 'type', label: 'Type' },
                    { key: 'due_date', label: 'Due Date' },
                    { key: 'status', label: 'Status' }
                ]
            };
            return columns[page] || [];
        }

        getBulkDeleteMethodName(page) {
            const map = {
                'suppliers': 'deleteMultipleSuppliers',
                'supplier-payments': 'deleteMultipleSupplierPayments',
                'customer-payments': 'deleteMultipleCustomerPayments'
            };
            return map[page] || '';
        }

        getSelectAllMethodName(page) {
            const map = {
                'suppliers': 'selectAllSuppliers',
                'supplier-payments': 'selectAllSupplierPayments',
                'customer-payments': 'selectAllCustomerPayments'
            };
            return map[page] || '';
        }

        getCheckboxName(page) {
            const map = {
                'suppliers': 'selected_supplier',
                'supplier-payments': 'selected_supplier_payment',
                'customer-payments': 'selected_customer_payment'
            };
            return map[page] || '';
        }

        deleteMultipleSuppliers() {
            const selected = document.querySelectorAll('input[name="selected_supplier"]:checked');
            if (selected.length === 0) {
                this.showError('Please select at least one supplier to delete');
                return;
            }

            if (!confirm(`Are you sure you want to delete ${selected.length} supplier(s)?`)) return;

            const ids = Array.from(selected).map(cb => parseInt(cb.value));

            $.ajax({
                url: 'api/suppliers/delete-multiple',
                method: 'POST',
                data: JSON.stringify({ ids: ids }),
                contentType: 'application/json',
                success: (response) => {
                    this.loadPage('suppliers');
                    this.showSuccess(response.message);
                },
                error: () => {
                    this.showError('Failed to delete suppliers');
                }
            });
        }

        deleteMultipleSupplierPayments() {
            const selected = document.querySelectorAll('input[name="selected_supplier_payment"]:checked');
            if (selected.length === 0) {
                this.showError('Please select at least one payment to delete');
                return;
            }

            if (!confirm(`Are you sure you want to delete ${selected.length} payment(s)?`)) return;

            const ids = Array.from(selected).map(cb => parseInt(cb.value));

            $.ajax({
                url: 'api/supplier-payments/delete-multiple',
                method: 'POST',
                data: JSON.stringify({ ids: ids }),
                contentType: 'application/json',
                success: (response) => {
                    this.loadPage('supplier-payments');
                    this.showSuccess(response.message);
                },
                error: () => {
                    this.showError('Failed to delete payments');
                }
            });
        }

        deleteMultipleCustomerPayments() {
            const selected = document.querySelectorAll('input[name="selected_customer_payment"]:checked');
            if (selected.length === 0) {
                this.showError('Please select at least one payment to delete');
                return;
            }

            if (!confirm(`Are you sure you want to delete ${selected.length} payment(s)?`)) return;

            const ids = Array.from(selected).map(cb => parseInt(cb.value));

            $.ajax({
                url: 'api/customer-payments/delete-multiple',
                method: 'POST',
                data: JSON.stringify({ ids: ids }),
                contentType: 'application/json',
                success: (response) => {
                    this.loadPage('customer-payments');
                    this.showSuccess(response.message);
                },
                error: () => {
                    this.showError('Failed to delete payments');
                }
            });
        }

        // ============================================================
        // UTILITY METHODS
        // ============================================================
        toggleAllCheckboxes(masterCheckbox) {
            const checkboxes = document.querySelectorAll('input[type="checkbox"][name^="selected_"]');
            checkboxes.forEach(cb => cb.checked = masterCheckbox.checked);
        }

        selectAllSuppliers() {
            document.querySelectorAll('input[name="selected_supplier"]').forEach(cb => cb.checked = true);
        }

        selectAllSupplierPayments() {
            document.querySelectorAll('input[name="selected_supplier_payment"]').forEach(cb => cb.checked = true);
        }

        selectAllCustomerPayments() {
            document.querySelectorAll('input[name="selected_customer_payment"]').forEach(cb => cb.checked = true);
        }

        getStatusBadge(status) {
            const classes = {
                'Paid': 'badge-paid',
                'Pending': 'badge-pending',
                'Overdue': 'badge-overdue'
            };
            return `<span class="badge-status ${classes[status] || 'badge-pending'}">${status || 'Pending'}</span>`;
        }

        formatCurrency(amount) {
            if (!amount && amount !== 0) return '0.00';
            return parseFloat(amount).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        showSuccess(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-success alert-dismissible fade show position-fixed top-0 end-0 m-3';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.maxWidth = '400px';
            alertDiv.innerHTML = `
                <strong>✅ Success!</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        showError(message) {
            const alertDiv = document.createElement('div');
            alertDiv.className = 'alert alert-danger alert-dismissible fade show position-fixed top-0 end-0 m-3';
            alertDiv.style.zIndex = '9999';
            alertDiv.style.maxWidth = '400px';
            alertDiv.innerHTML = `
                <strong>❌ Error!</strong> ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alertDiv);
            setTimeout(() => {
                alertDiv.remove();
            }, 5000);
        }

        showCompanySwitch() {
            const body = document.getElementById('companyModalBody');
            body.innerHTML = '<div class="text-center"><div class="spinner-border"></div></div>';
            this.companyModalInstance.show();

            $.ajax({
                url: 'api/companies',
                method: 'GET',
                success: (data) => {
                    let html = '<p>Select a company to switch to:</p><div class="list-group">';
                    data.forEach(company => {
                        const isActive = company.is_active ? 'active' : '';
                        const badge = company.is_active ?
                            '<span class="badge bg-success float-end">Active</span>' :
                            '<span class="badge bg-secondary float-end">Inactive</span>';
                        html += `
                            <button class="list-group-item list-group-item-action ${isActive}"
                                    onclick="app.switchCompany(${company.id})">
                                <h6 class="mb-1">${company.name}</h6>
                                <small>${company.currency}</small>
                                ${badge}
                            </button>
                        `;
                    });
                    html += '</div>';
                    body.innerHTML = html;
                }
            });
        }

        switchCompany(companyId) {
            $.ajax({
                url: `api/companies/${companyId}`,
                method: 'PUT',
                data: JSON.stringify({ is_active: true }),
                contentType: 'application/json',
                success: () => {
                    this.companyModalInstance.hide();
                    this.loadCompanyInfo();
                    this.loadPage(this.currentPage);
                    this.showSuccess('Company switched successfully');
                },
                error: () => {
                    this.showError('Failed to switch company');
                }
            });
        }

        importData(file) {
            const formData = new FormData();
            formData.append('file', file);

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            this.showSuccess(`Importing ${this.currentPage}... Please wait.`);

            $.ajax({
                url: `api/import/${this.currentPage}`,
                method: 'POST',
                data: formData,
                processData: false,
                contentType: false,
                success: (response) => {
                    loading.classList.remove('active');

                    let message = response.message || 'Data imported successfully';
                    if (response.imported !== undefined) {
                        message = `✅ ${response.imported} records imported successfully`;
                        if (response.errors && response.errors.length > 0) {
                            message += `\n⚠️ ${response.errors.length} errors occurred`;
                            console.log('Import errors:', response.errors);
                        }
                    }

                    this.showSuccess(message);
                    this.loadPage(this.currentPage);
                },
                error: (err) => {
                    loading.classList.remove('active');
                    let errorMsg = 'Failed to import data';
                    if (err.responseJSON && err.responseJSON.error) {
                        errorMsg = err.responseJSON.error;
                    }
                    this.showError(errorMsg);
                    console.error('Error:', err);
                }
            });
        }

        exportData() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            window.location.href = `api/export/${this.currentPage}`;

            setTimeout(() => {
                loading.classList.remove('active');
                this.showSuccess(`Export started for ${this.currentPage}`);
            }, 2000);
        }

        downloadTemplate() {
            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            window.location.href = `api/download-template/${this.currentPage}`;

            setTimeout(() => {
                loading.classList.remove('active');
                this.showSuccess(`Template downloaded for ${this.currentPage}`);
            }, 2000);
        }
    }

    // ============================================================
    // EVENT HANDLERS
    // ============================================================
    const app = new PaymentSystem();

    document.addEventListener('submit', function(e) {
        if (e.target.id === 'entityForm') {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                if (key === 'amount' && value) {
                    data[key] = parseFloat(value.replace(/,/g, ''));
                } else if (value) {
                    data[key] = value;
                }
            });

            const isUpdate = form.dataset.action === 'update';
            const id = form.dataset.id || '';
            const page = app.currentPage;
            const url = isUpdate ? `api/${page}/${id}` : `api/${page}`;
            const method = isUpdate ? 'PUT' : 'POST';

            console.log('Submitting form:', { page, url, method, data });

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            $.ajax({
                url: url,
                method: method,
                data: JSON.stringify(data),
                contentType: 'application/json',
                success: (response) => {
                    loading.classList.remove('active');
                    app.modalInstance.hide();
                    app.loadPage(page);
                    app.showSuccess(isUpdate ? 'Updated successfully' : 'Added successfully');
                },
                error: (err) => {
                    loading.classList.remove('active');
                    let errorMsg = 'Failed to save data';
                    if (err.responseJSON && err.responseJSON.error) {
                        errorMsg = err.responseJSON.error;
                    }
                    app.showError(errorMsg);
                    console.error('Error:', err);
                }
            });
        }

        if (e.target.id === 'companyForm') {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const data = {};
            formData.forEach((value, key) => {
                if (key === 'is_active') {
                    data[key] = value === 'on';
                } else if (value) {
                    data[key] = value;
                }
            });

            const isUpdate = form.dataset.action === 'update';
            const id = form.dataset.id || '';
            const url = isUpdate ? `api/companies/${id}` : 'api/companies';
            const method = isUpdate ? 'PUT' : 'POST';

            const loading = document.getElementById('loadingOverlay');
            loading.classList.add('active');

            $.ajax({
                url: url,
                method: method,
                data: JSON.stringify(data),
                contentType: 'application/json',
                success: (response) => {
                    loading.classList.remove('active');
                    app.modalInstance.hide();
                    app.loadPage('companies');
                    app.loadCompanyInfo();
                    app.showSuccess(response.message || (isUpdate ? 'Company updated successfully' : 'Company created successfully'));
                },
                error: (err) => {
                    loading.classList.remove('active');
                    const errorMsg = err.responseJSON?.error || 'Failed to save company';
                    app.showError(errorMsg);
                    console.error('Error:', err);
                }
            });
        }
    });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (document.activeElement.id === 'startDate' ||
                document.activeElement.id === 'endDate' ||
                document.activeElement.id === 'openingBalance') {
                app.runCashflowReport();
            }
            if (document.activeElement.id === 'reportStartDate' ||
                document.activeElement.id === 'reportEndDate' ||
                document.activeElement.id === 'reportSupplierFilter' ||
                document.activeElement.id === 'reportStatusFilter') {
                app.runSupplierPaymentReport();
            }
            if (document.activeElement.id === 'scheduleStartDate' ||
                document.activeElement.id === 'scheduleEndDate' ||
                document.activeElement.id === 'scheduleTypeFilter' ||
                document.activeElement.id === 'scheduleSupplierFilter' ||
                document.activeElement.id === 'scheduleStatusFilter') {
                app.applyScheduleFilters();
            }
        }
    });
</script>
