<!-- Add/Edit Modal -->

    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add New</h5>

            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic form will be loaded here -->
            </div>
        </div>
    </div>
</div>
